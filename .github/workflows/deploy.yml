name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.name }}
      tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepare image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-image
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          test -n "$SERVER_HOST"
          test -n "$SERVER_SSH_KEY"
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SERVER_PORT:-22}" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Prepare deploy files
        env:
          IMAGE: ${{ needs.build-image.outputs.image }}:${{ needs.build-image.outputs.tag }}
          APP_PORT: ${{ secrets.APP_PORT }}
          CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
        run: |
          mkdir -p .deploy
          cp deploy/docker-compose.yml .deploy/docker-compose.yml
          {
            echo "IMAGE=$IMAGE"
            echo "APP_PORT=${APP_PORT:-38080}"
            echo "CONTAINER_NAME=${CONTAINER_NAME:-haunted-elevator}"
          } > .deploy/.env

      - name: Upload deploy files
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -n "$SERVER_USER"
          test -n "$DEPLOY_PATH"
          ssh -i ~/.ssh/deploy_key -p "${SERVER_PORT:-22}" "$SERVER_USER@$SERVER_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key -P "${SERVER_PORT:-22}" .deploy/docker-compose.yml .deploy/.env "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/"

      - name: Deploy container
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE: ${{ needs.build-image.outputs.image }}:${{ needs.build-image.outputs.tag }}
          APP_PORT: ${{ secrets.APP_PORT }}
          CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${SERVER_PORT:-22}" "$SERVER_USER@$SERVER_HOST" \
            "cd '$DEPLOY_PATH' && \
            if [ -n '$GHCR_USERNAME' ] && [ -n '$GHCR_TOKEN' ]; then echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin; fi && \
            docker compose pull && \
            docker compose up -d && \
            docker image prune -f"
